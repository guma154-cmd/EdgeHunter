name: Deploy EdgeHunter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-edgehunter-main
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 25
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Validar clone e diretório real de deploy
        run: |
          DEPLOY_DIR="/home/telematica/EdgeHunter"
          echo "Deploy dir: $DEPLOY_DIR"

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "ERRO: clone Git não encontrado em $DEPLOY_DIR"
            exit 1
          fi

      - name: Atualizar código no clone persistente
        run: |
          DEPLOY_DIR="/home/telematica/EdgeHunter"
          cd "$DEPLOY_DIR"
          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main

      - name: Build e restart containers
        run: |
          DEPLOY_DIR="/home/telematica/EdgeHunter"
          cd "$DEPLOY_DIR"

          # Tentar docker compose (v2) primeiro, depois v1
          if docker compose version >/dev/null 2>&1; then
            DOCKER_CMD="docker compose"
          else
            DOCKER_CMD="docker-compose"
          fi

          $DOCKER_CMD down --remove-orphans
          $DOCKER_CMD build --pull backend
          $DOCKER_CMD up -d --remove-orphans backend

      - name: Verificar saúde do container
        run: |
          : "${DEPLOY_DIR:=/srv/edgehunter}"
          cd "$DEPLOY_DIR"

          docker_compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          docker_compose ps

          for attempt in {1..12}; do
            if curl -fsS http://localhost:5000/api/health >/dev/null; then
              exit 0
            fi

            echo "Healthcheck falhou (tentativa $attempt/12), aguardando..."
            sleep 10
          done

          echo "ERRO: backend não respondeu em até 120s"
          docker_compose logs --tail=80 backend
          exit 1

      - name: Log de startup
        run: |
          : "${DEPLOY_DIR:=/srv/edgehunter}"
          cd "$DEPLOY_DIR"

          if docker compose version >/dev/null 2>&1; then
            docker compose logs --tail=30 backend
          else
            docker-compose logs --tail=30 backend
          fi
